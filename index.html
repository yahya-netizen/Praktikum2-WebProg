<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data Mahasiswa</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .card {
            border: none;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .card-header {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }
        .btn-action {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="fas fa-users me-2"></i>Data Mahasiswa</span>
            <button class="btn btn-light btn-sm" id="btnAdd" data-bs-toggle="modal" data-bs-target="#mhsModal">
                <i class="fas fa-plus me-1"></i> Tambah Mahasiswa
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="mhsTable">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>NPM</th>
                            <th>Nama</th>
                            <th>Jurusan</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="mhsList">
                        <!-- Data will be loaded here via JS -->
                        <tr>
                            <td colspan="5" class="text-center py-4">Memuat data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Tambah/Edit -->
<div class="modal fade" id="mhsModal" tabindex="-1" aria-labelledby="mhsModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="mhsModalLabel">Tambah Mahasiswa</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="mhsForm">
                <div class="modal-body">
                    <input type="hidden" id="mhsId">
                    <div class="mb-3">
                        <label for="npm" class="form-label">NPM</label>
                        <input type="text" class="form-control" id="npm" required placeholder="Contoh: 21121111">
                    </div>
                    <div class="mb-3">
                        <label for="nama" class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control" id="nama" required placeholder="Masukkan Nama Mahasiswa">
                    </div>
                    <div class="mb-3">
                        <label for="jurusan" class="form-label">Jurusan</label>
                        <select class="form-select" id="jurusan" required>
                            <option value="">-- Pilih Jurusan --</option>
                            <option value="Informatika">Informatika</option>
                            <option value="Sistem Informasi">Sistem Informasi</option>
                            <option value="Teknik Komputer">Teknik Komputer</option>
                            <option value="Manajemen Informatika">Manajemen Informatika</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Simpan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- SweetAlert2 for nice alerts -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const API_URL = 'api/';
    const mhsModal = new bootstrap.Modal(document.getElementById('mhsModal'));
    const mhsForm = document.getElementById('mhsForm');
    const mhsList = document.getElementById('mhsList');
    const mhsModalLabel = document.getElementById('mhsModalLabel');
    const btnSubmit = document.getElementById('btnSubmit');

    // Fetch and display mahasiswa data
    async function loadMahasiswa() {
        try {
            const response = await fetch(`${API_URL}read.php`);
            const data = await response.json();

            mhsList.innerHTML = '';

            if (response.status === 404) {
                mhsList.innerHTML = '<tr><td colspan="5" class="text-center py-4">Tidak ada data mahasiswa ditemukan.</td></tr>';
                return;
            }

            data.forEach(mhs => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${mhs.id}</td>
                    <td>${mhs.npm}</td>
                    <td>${mhs.nama}</td>
                    <td>${mhs.jurusan}</td>
                    <td class="text-center">
                        <button class="btn btn-warning btn-sm btn-action me-1" onclick="editMahasiswa(${JSON.stringify(mhs).replace(/"/g, '&quot;')})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-danger btn-sm btn-action" onclick="deleteMahasiswa(${mhs.id})">
                            <i class="fas fa-trash"></i> Hapus
                        </button>
                    </td>
                `;
                mhsList.appendChild(row);
            });
        } catch (error) {
            console.error('Error fetching data:', error);
            mhsList.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">Terjadi kesalahan saat mengambil data.</td></tr>';
        }
    }

    // Reset form and modal for adding new student
    document.getElementById('btnAdd').addEventListener('click', () => {
        mhsModalLabel.innerText = 'Tambah Mahasiswa';
        btnSubmit.innerText = 'Simpan';
        mhsForm.reset();
        document.getElementById('mhsId').value = '';
    });

    // Handle form submission (Create & Update)
    mhsForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const id = document.getElementById('mhsId').value;
        const npm = document.getElementById('npm').value;
        const nama = document.getElementById('nama').value;
        const jurusan = document.getElementById('jurusan').value;

        const payload = { npm, nama, jurusan };
        let url = `${API_URL}create.php`;
        let method = 'POST';

        if (id) {
            payload.id = id;
            url = `${API_URL}update.php`;
            method = 'PUT';
        }

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                Swal.fire('Berhasil!', result.message, 'success');
                mhsModal.hide();
                loadMahasiswa();
            } else {
                Swal.fire('Gagal!', result.message || 'Terjadi kesalahan.', 'error');
            }
        } catch (error) {
            console.error('Error saving data:', error);
            Swal.fire('Error!', 'Koneksi ke server bermasalah.', 'error');
        }
    });

    // Open modal with pre-filled data for editing
    window.editMahasiswa = (mhs) => {
        mhsModalLabel.innerText = 'Edit Mahasiswa';
        btnSubmit.innerText = 'Perbarui';
        document.getElementById('mhsId').value = mhs.id;
        document.getElementById('npm').value = mhs.npm;
        document.getElementById('nama').value = mhs.nama;
        document.getElementById('jurusan').value = mhs.jurusan;
        mhsModal.show();
    };

    // Handle deletion
    window.deleteMahasiswa = async (id) => {
        const confirm = await Swal.fire({
            title: 'Apakah Anda yakin?',
            text: "Data mahasiswa akan dihapus secara permanen!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Ya, hapus!',
            cancelButtonText: 'Batal'
        });

        if (confirm.isConfirmed) {
            try {
                const response = await fetch(`${API_URL}delete.php`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });

                const result = await response.json();

                if (response.ok) {
                    Swal.fire('Dihapus!', result.message, 'success');
                    loadMahasiswa();
                } else {
                    Swal.fire('Gagal!', result.message || 'Gagal menghapus data.', 'error');
                }
            } catch (error) {
                console.error('Error deleting data:', error);
                Swal.fire('Error!', 'Koneksi ke server bermasalah.', 'error');
            }
        }
    };

    // Initial load
    document.addEventListener('DOMContentLoaded', loadMahasiswa);
</script>

</body>
</html>
